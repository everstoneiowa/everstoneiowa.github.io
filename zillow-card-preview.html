<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EverStone · Zillow Card Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#b8922a; --gold-light:#d4aa4a;
    --black:#0e0e0e; --charcoal:#2a2a2a;
    --white:#ffffff; --off-white:#f8f6f2; --text-muted:#888;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Montserrat',sans-serif; background:var(--off-white); color:var(--black); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }
  .preview-label { font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:6px; }
  .preview-sub { font-size:12px; color:var(--text-muted); margin-bottom:28px; }

  .home-card { width:360px; max-width:100%; background:var(--white); border:1px solid rgba(0,0,0,0.07); overflow:hidden; transition:all 0.35s; cursor:pointer; }
  .home-card:hover { transform:translateY(-5px); box-shadow:0 20px 50px rgba(0,0,0,0.11); border-color:rgba(184,146,42,0.3); }
  .home-card-img { height:220px; position:relative; overflow:hidden; background:var(--charcoal); display:flex; align-items:center; justify-content:center; }
  .home-card-img img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.5s ease; }
  .home-card:hover .home-card-img img { transform:scale(1.04); }
  .status-badge { position:absolute; top:14px; left:14px; font-size:9px; letter-spacing:0.15em; text-transform:uppercase; font-weight:700; padding:5px 12px; }
  .badge-available { background:rgba(184,146,42,0.92); color:var(--black); }
  .home-card-body { padding:22px; }
  .home-card-community { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:5px; }
  .home-card-name { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; color:var(--black); margin-bottom:4px; }
  .home-card-note { font-size:11px; color:var(--text-muted); margin-bottom:16px; }
  .home-card-specs { display:flex; padding:12px 0; border-top:1px solid rgba(0,0,0,0.07); border-bottom:1px solid rgba(0,0,0,0.07); margin-bottom:16px; }
  .home-spec { flex:1; text-align:center; border-right:1px solid rgba(0,0,0,0.07); }
  .home-spec:last-child { border-right:none; }
  .home-spec-val { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600; color:var(--black); }
  .home-spec-label { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-top:1px; }
  .home-card-footer { display:flex; align-items:center; justify-content:space-between; }
  .home-price { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:700; color:var(--black); }
  .home-price-sub { font-size:10px; color:var(--text-muted); margin-top:1px; }
  .btn-details { background:var(--black); color:var(--gold); padding:10px 18px; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; font-weight:700; border:none; cursor:pointer; transition:all 0.25s; font-family:'Montserrat',sans-serif; text-decoration:none; display:inline-block; white-space:nowrap; }
  .btn-details:hover { background:var(--gold); color:var(--black); }
</style>
</head>
<body>
  <div class="preview-label">Available Homes — Card Preview</div>
  <div class="preview-sub">Pulled from Zillow · hover the card · the button opens the live listing</div>

  <div class="home-card" onclick="document.getElementById('zlink').click()">
    <div class="home-card-img">
      <img src="https://photos.zillowstatic.com/fp/52dc425b2f4edf6fade2aed0b03a6611-cc_ft_1536.jpg" alt="708 NE Doe Pointe Drive" />
      <span class="status-badge badge-available">Move-In Ready</span>
    </div>
    <div class="home-card-body">
      <div class="home-card-community">The Crossings at Deer Creek</div>
      <div class="home-card-name">708 NE Doe Pointe Drive</div>
      <div class="home-card-note">$489,900</div>
      <div class="home-card-specs">
        <div class="home-spec"><div class="home-spec-val">4</div><div class="home-spec-label">Beds</div></div>
        <div class="home-spec"><div class="home-spec-val">3</div><div class="home-spec-label">Baths</div></div>
        <div class="home-spec"><div class="home-spec-val">1,512</div><div class="home-spec-label">Sq Ft</div></div>
        <div class="home-spec"><div class="home-spec-val">3</div><div class="home-spec-label">Garage</div></div>
      </div>
      <div class="home-card-footer">
        <div>
          <div class="home-price">Ankeny, Iowa</div>
          <div class="home-price-sub">Move-In Ready</div>
        </div>
        <a id="zlink" class="btn-details" href="https://www.zillow.com/homedetails/708-NE-Doe-Pointe-Dr-Ankeny-IA-50021/457570529_zpid/" target="_blank" rel="noopener" onclick="event.stopPropagation();">View on Zillow →</a>
      </div>
    </div>
  </div>
</body>
</html>
